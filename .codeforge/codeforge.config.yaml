# Project-local codeforge configuration for "codeforge-dashboard".
# Full copy of the installation defaults — edit any field to customize this project.
# This file is deep-merged over codeforge/config/codeforge.config.yaml at load time.
name: "codeforge-v1"
schema_version: "1.0.0"

stack:
  profile: "nextjs"

retry_limits:
  code_review_loop: 3
  security_review_loop: 3
  test_loop: 2                        # shared: fail_code_bug, fail_test_bug, fail_spec_gap
  coder_validation_retries: 2         # dependency manifest present + AC coverage; fires before review
  architecture_validation_retries: 2
  infrastructure_retries: 3           # shared: test runner error + test analyst error verdict
  environment_repair: 2               # auto-recovery: re-invoke test_designer to fix test infra/deps
  dependency_repair: 2                # auto-recovery: re-invoke coder to fix the runtime dependency manifest (or a build/type-check failure)
  low_confidence_reprompt: 1          # one-shot re-prompt before a low-confidence escalation
  malformed_output_retries: 2         # independent of all loop counters
  codeforge_state_commit: 3
  source_code_commit: 3

global_ceiling:
  max_agent_calls_per_run: 40
  # Tune guidance:
  # - Happy path: ~7 calls (one per LLM agent), plus clarification rounds
  # - Code review retry: +2 calls per iteration (coder + reviewer)
  # - Security retry: +3 per iteration (coder + code reviewer + security reviewer)
  # - Test loop retry: +4-8 depending on verdict type
  # - spec_gap re-entry: ~8-10 additional calls minimum
  # - fail_code_bug re-entry: ~6-8 additional calls (coder + reviews + test design + analyst)

confidence_thresholds:
  requirements_analyst: 0.80
  architecture_designer: 0.70
  coder: 0.80
  code_reviewer: 0.85
  security_reviewer: 0.90
  test_designer: 0.80
  test_analyst: 0.80
  # test_runner and orchestrator are mechanical — no thresholds

test_runner:
  timeout_seconds: 300
  sandbox_image: "node:20-bookworm"
  environment_vars: {}

# Read-only codebase tools (continuation runs). Tool-enabled agents are defined
# in firewall/manifest.yaml (tool_access); this only tunes the loop.
tools:
  max_tool_turns: 12                  # per-agent-invocation cap on the tool loop

# Per-agent model configuration
agents:
  requirements_analyst:
    model: "claude-sonnet-4-6"
    temperature: 0.3
    max_tokens: 16000
    streaming: true 
    system_prompt: "prompts/rendered/requirements_analyst.md"
    metadata:
      agent_id: "requirements_analyst"
      name: "codeforge-v1"

  architecture_designer:
    model: "claude-sonnet-4-6"
    temperature: 1            # required when thinking is enabled
    max_tokens: 64000         # must exceed thinking.budget_tokens (8000)
    thinking:
      enabled: true
      budget_tokens: 32000
    streaming: true           # stream chunks to avoid HTTP timeout on long outputs
    system_prompt: "prompts/rendered/architecture_designer.md"
    metadata:
      agent_id: "architecture_designer"
      name: "codeforge-v1"

  coder:
    model: "claude-opus-4-8"
    temperature: 0.2
    max_tokens: 64000
    streaming: true
    system_prompt: "prompts/rendered/coder.md"
    metadata:
      agent_id: "coder"
      name: "codeforge-v1"

  code_reviewer:
    model: "claude-sonnet-4-6"
    temperature: 1            # required when thinking is enabled
    max_tokens: 24000         # must exceed thinking.budget_tokens (6000)
    thinking:
      enabled: true
      budget_tokens: 12000
    system_prompt: "prompts/rendered/code_reviewer.md"
    metadata:
      agent_id: "code_reviewer"
      name: "codeforge-v1"

  security_reviewer:
    model: "claude-sonnet-4-6"
    temperature: 1            # required when thinking is enabled
    max_tokens: 24000         # must exceed thinking.budget_tokens (6000)
    thinking:
      enabled: true
      budget_tokens: 12000
    system_prompt: "prompts/rendered/security_reviewer.md"
    metadata:
      agent_id: "security_reviewer"
      name: "codeforge-v1"

  test_designer:
    model: "claude-sonnet-4-6"
    temperature: 0.1
    max_tokens: 64000         
    streaming: true           # stream chunks to avoid HTTP timeout on long outputs
    system_prompt: "prompts/rendered/test_designer.md"
    metadata:
      agent_id: "test_designer"
      name: "codeforge-v1"

  test_analyst:
    model: "claude-sonnet-4-6"
    temperature: 1            # required when thinking is enabled
    max_tokens: 64000         # must exceed thinking.budget_tokens (10000)
    streaming: true           # stream chunks to avoid HTTP timeout on long outputs
    thinking:
      enabled: true
      budget_tokens: 32000
    system_prompt: "prompts/rendered/test_analyst.md"
    metadata:
      agent_id: "test_analyst"
      name: "codeforge-v1"

repos:
  codeforge_state:
    remote: "git@github.com:stephen-ggg/codeforge-dashboard-state.git"
    branch: "main"

  source_code:
    path: "/home/sabbamonte/projects/codeforge-dashboard/source"
    remote: "git@github.com:stephen-ggg/codeforge-dashboard.git"
    default_branch: "main"
    branch_prefix: "codeforge/"
    pr_target: "main"
    auto_merge: false
    output_dir: "src"   # informational only — the coder's file paths are written verbatim
                        # at the repo root, so this does not affect placement.
